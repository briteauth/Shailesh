<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spline</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    iframe { display: block; width: 100%; height: 100%; border: none; }
    .floating-text {
      position: fixed;
      top: 12%;
      left: 50%;
      transform: translate(-50%, 0) rotateX(20deg);
      font-family: 'Dancing Script', cursive;
      font-size: 5rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.04em;
      text-shadow:
        0 1px 0 #ccc,
        0 2px 0 #bbb,
        0 3px 0 #aaa,
        0 4px 0 #999,
        0 5px 0 #888,
        0 6px 0 #777,
        0 8px 10px rgba(0,0,0,0.6),
        0 12px 30px rgba(0,0,0,0.4);
      pointer-events: none;
      animation: float 3s ease-in-out infinite;
      z-index: 10;
      perspective: 500px;
    }
    @keyframes float {
      0%, 100% { top: 12%; }
      50%       { top: 10%; }
    }
  </style>
</head>
<body>
  <iframe src="https://my.spline.design/robotarm-92MMjp8WukXIJusbSPpiw5az/" frameborder="0" width="100%" height="100%"></iframe>
  <div class="floating-text">shailu_nigga</div>
  <div style="position:fixed;bottom:0;right:0;width:180px;height:50px;background:#000;z-index:10;"></div>
</body>
</html>
